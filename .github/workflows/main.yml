# GitHub Actions - Deploy to AWS using OIDC 
name: Connect to AWS using set role to deploy

# Controls when the action will run. Invokes the workflow on push events but only for the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Change to reflect your IAM role’s ARN
  AWS_REGION : "ca-central-1" # Change to reflect your Region
  AWS_ROLE_ARN: "arn:aws:iam::586794440352:role/GitHubAction-AssumeRoleWithAction"
  AWS_ROLE_SESSION_NAME: "GitHub_to_AWS_via_Federated_OIDC"

# Permission can be added at job level or workflow level    
permissions:
      id-token: write   # This is required for requesting the JWT
      contents: read    # This is required for actions/checkout
jobs:
  AssumeRoleAndCallIdentity:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}
      # Hello from AWS: WhoAmI
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity