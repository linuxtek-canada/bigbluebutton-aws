name: "Terraform Bootstrap"

on:
  workflow_dispatch:

env:
  AWS_REGION: ca-central-1
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_BOOTSTRAP }}
  AWS_ROLE_SESSION_NAME: GitHub_to_AWS_Bootstrap
  TF_VAR_github_org: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: "Bootstrap State Backend"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS OIDC Login
        uses: ./.github/actions/aws-login-action
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: ${{ env.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve -input=false

      - name: Output Role ARNs
        run: |
          echo "=== Bootstrap Complete ==="
          echo ""
          echo "Per-environment role ARNs (add these as GitHub Secrets):"
          echo ""
          terraform output -json github_actions_role_arns
          echo ""
          echo "State bucket names:"
          terraform output -json state_buckets
          echo ""
          echo "=== Update GitHub Secrets with the role ARNs above ==="
