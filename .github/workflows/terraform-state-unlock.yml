name: "Terraform State Unlock"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to unlock"
        required: true
        type: choice
        options:
          - dev
          - prod
      lockid:
        description: "Terraform State Lock ID"
        required: true
        type: string

env:
  AWS_REGION: ca-central-1
  AWS_ROLE_SESSION_NAME: GitHub_to_AWS_State_Unlock

permissions:
  id-token: write
  contents: read

jobs:
  unlock:
    name: "Force Unlock State - ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Role ARN
        id: role
        run: |
          if [ "${{ github.event.inputs.environment }}" == "dev" ]; then
            echo "arn=${{ secrets.AWS_ROLE_ARN_DEV }}" >> $GITHUB_OUTPUT
          else
            echo "arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> $GITHUB_OUTPUT
          fi

      - name: AWS OIDC Login
        uses: ./.github/actions/aws-login-action
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          role-session-name: ${{ env.AWS_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Init
        run: terraform init -input=false

      - name: Force Unlock
        run: terraform force-unlock -force ${{ github.event.inputs.lockid }} || true
